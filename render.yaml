services:
  - type: web
    name: affilmax-n8n
    env: docker
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    region: oregon
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        value: affilmax2024
      - key: GROQ_API_KEY
        sync: false
      - key: N8N_AMAZON_TAG
        value: confortbure07-21
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: affilmax-postgres
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: affilmax-postgres
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: affilmax-postgres
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: affilmax-postgres
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: affilmax-postgres
          property: password

databases:
  - name: affilmax-postgres
    plan: free
    region: oregon
